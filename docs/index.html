<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBM Paper Tracker</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3348;
    --text: #e4e6ed;
    --text-dim: #8890a4;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 0;
  }

  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }

  .stats {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
  }
  .stats .num { color: var(--accent); font-weight: 600; }

  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .panel-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
  }

  .search-bar {
    flex: 1;
    min-width: 200px;
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-bar:focus { border-color: var(--accent); }

  .paper-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .paper-card {
    padding: 14px 16px;
    margin-bottom: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .paper-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .paper-card.active { border-color: var(--accent); background: var(--surface2); }

  .paper-card .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.35; }
  .paper-card .authors { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .paper-card .summary {
    font-size: 13px; color: var(--text-dim); margin-bottom: 8px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .paper-card .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(99, 102, 241, 0.15); color: var(--accent);
  }
  .tag.manual { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
  .score { font-size: 11px; color: var(--text-dim); }

  .paper-card .links { margin-top: 8px; display: flex; gap: 12px; }
  .paper-card .links a { font-size: 12px; color: var(--accent); text-decoration: none; }
  .paper-card .links a:hover { text-decoration: underline; }

  .viz-container { flex: 1; position: relative; background: var(--bg); }
  .viz-container .js-plotly-plot { width: 100% !important; height: 100% !important; }

  .viz-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 14px; padding: 20px; text-align: center;
  }

  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; color: var(--text-dim); font-size: 14px;
  }

  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.6s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1><span>⚡</span> EBM Paper Tracker</h1>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="panel-left">
    <div class="panel-header">
      <h2>Papers</h2>
      <input class="search-bar" type="text" placeholder="Search papers..."
             id="searchInput" oninput="handleSearch()" />
    </div>
    <div class="paper-list" id="paperList">
      <div class="loading"><div class="spinner"></div>Loading papers...</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-header">
      <h2>Research Landscape</h2>
    </div>
    <div class="viz-container" id="vizContainer">
      <div class="loading"><div class="spinner"></div>Loading visualization...</div>
    </div>
  </div>
</div>

<script>
let allPapers = [];
let vizData = [];

async function fetchPapers() {
  try {
    const res = await fetch('papers.json');
    allPapers = await res.json();
    renderPapers(allPapers);
    document.getElementById('stats').innerHTML = `
      <span><span class="num">${allPapers.length}</span> papers</span>
      <span><span class="num">${allPapers.filter(p => p.source === 'arxiv').length}</span> arxiv</span>
      <span><span class="num">${allPapers.filter(p => p.source === 'manual').length}</span> manual</span>
    `;
  } catch (e) {
    document.getElementById('paperList').innerHTML =
      '<div class="loading" style="color: var(--red)">Failed to load papers</div>';
  }
}

async function fetchViz() {
  try {
    const res = await fetch('umap.json');
    const data = await res.json();
    vizData = Array.isArray(data) ? data : (data.papers || []);
    renderViz(vizData);
  } catch (e) {
    document.getElementById('vizContainer').innerHTML =
      '<div class="viz-empty">No visualization data yet.</div>';
  }
}

function renderPapers(papers) {
  const list = document.getElementById('paperList');
  if (!papers.length) {
    list.innerHTML = '<div class="viz-empty">No papers found.</div>';
    return;
  }
  list.innerHTML = papers.map(p => {
    const authors = (p.authors || []).slice(0, 3).join(', ');
    const moreAuthors = (p.authors || []).length > 3 ? ` +${p.authors.length - 3}` : '';
    const keywords = (p.keywords || []).map(k => `<span class="tag">${k}</span>`).join('');
    const sourceTag = p.source === 'manual' ? '<span class="tag manual">manual</span>' : '';
    const score = p.similarity_score ? `<span class="score">${(p.similarity_score * 100).toFixed(0)}% match</span>` : '';
    const date = p.published ? new Date(p.published).toLocaleDateString() : '';
    return `
      <div class="paper-card" onclick="highlightViz('${p.arxiv_id}')">
        <div class="title">${esc(p.title)}</div>
        <div class="authors">${esc(authors + moreAuthors)} · ${date}</div>
        <div class="summary">${esc(p.summary || p.abstract || '')}</div>
        <div class="meta">${keywords} ${sourceTag} ${score}</div>
        <div class="links">
          <a href="${p.url}" target="_blank" rel="noopener">Paper ↗</a>
          <a href="${p.pdf_url}" target="_blank" rel="noopener">PDF ↗</a>
        </div>
      </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderPapers(allPapers); return; }
  renderPapers(allPapers.filter(p =>
    p.title.toLowerCase().includes(q) ||
    (p.summary || '').toLowerCase().includes(q) ||
    (p.keywords || []).some(k => k.toLowerCase().includes(q)) ||
    (p.authors || []).some(a => a.toLowerCase().includes(q))
  ));
}

function renderViz(data) {
  const container = document.getElementById('vizContainer');
  if (!data || !data.length) {
    container.innerHTML = '<div class="viz-empty">No visualization data yet.</div>';
    return;
  }
  container.innerHTML = '';
  const trace = {
    x: data.map(d => d.x),
    y: data.map(d => d.y),
    mode: 'markers',
    type: 'scattergl',
    text: data.map(d => {
      const authors = (d.authors || []).slice(0, 2).join(', ');
      const kws = (d.keywords || []).slice(0, 3).join(', ');
      return `<b>${trunc(d.title, 60)}</b><br>${authors}<br><i>${kws}</i><br>Sim: ${((d.similarity_score || 0) * 100).toFixed(0)}%`;
    }),
    hoverinfo: 'text',
    marker: {
      size: data.map(d => 6 + (d.similarity_score || 0.5) * 14),
      color: data.map(d => d.similarity_score || 0.5),
      colorscale: [[0, '#3b3f5c'], [0.5, '#6366f1'], [1, '#34d399']],
      cmin: 0.3, cmax: 1,
      line: { width: 0.5, color: '#1a1d27' },
      opacity: 0.85,
    },
    customdata: data.map(d => d.url),
  };
  const layout = {
    paper_bgcolor: '#0f1117', plot_bgcolor: '#0f1117',
    margin: { t: 20, r: 20, b: 30, l: 30 },
    xaxis: { showgrid: false, zeroline: false, showticklabels: false },
    yaxis: { showgrid: false, zeroline: false, showticklabels: false },
    hoverlabel: { bgcolor: '#1a1d27', bordercolor: '#6366f1', font: { color: '#e4e6ed', size: 12 } },
    dragmode: 'pan',
  };
  Plotly.newPlot(container, [trace], layout, { responsive: true, scrollZoom: true, displaylogo: false });
  container.on('plotly_click', e => {
    if (e.points?.[0]?.customdata) window.open(e.points[0].customdata, '_blank');
  });
}

function trunc(s, n) { return s && s.length > n ? s.substring(0, n) + '...' : (s || ''); }

function highlightViz(arxivId) {
  const idx = vizData.findIndex(d => d.arxiv_id === arxivId);
  if (idx < 0) return;
  const container = document.getElementById('vizContainer');
  Plotly.restyle(container, {
    'marker.size': [vizData.map((d, i) => i === idx ? 22 : 6 + (d.similarity_score || 0.5) * 14)],
    'marker.line.width': [vizData.map((d, i) => i === idx ? 3 : 0.5)],
    'marker.line.color': [vizData.map((d, i) => i === idx ? '#fb923c' : '#1a1d27')],
  }, [0]);
  setTimeout(() => Plotly.restyle(container, {
    'marker.size': [vizData.map(d => 6 + (d.similarity_score || 0.5) * 14)],
    'marker.line.width': [vizData.map(() => 0.5)],
    'marker.line.color': [vizData.map(() => '#1a1d27')],
  }, [0]), 3000);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

fetchPapers();
fetchViz();
</script>
</body>
</html>

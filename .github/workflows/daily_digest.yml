name: Daily EBM Digest

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          LLM_PROVIDER: mistral
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_digest.py

      - name: Export static site data
        env:
          LLM_PROVIDER: mistral
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python export_static.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ebm_tracker.db data/umap_viz.json docs/papers.json docs/umap.json
          git diff --staged --quiet || git commit -m "chore: daily digest update [skip ci]"
          git push
